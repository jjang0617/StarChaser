name: Deploy map-site to GitHub Pages

on:
  # develop 브랜치에 "map-site/"가 변경되면 자동 배포
  # - 앱(WebView)에서 로드할 URL: https://map.starchaser.app/kakao.html
  # - Kakao Map JavaScript SDK는 "도메인 등록"이 필요해서,
  #   WebView 안에서 실행될 실제 https 도메인을 하나 마련하는 목적
  push:
    branches: [develop]
    paths:
      - "map-site/**"
      - ".github/workflows/pages-map.yml"
  # 수동으로도 실행 가능 (GitHub → Actions → Run workflow)
  workflow_dispatch:

permissions:
  # GitHub Pages 배포에 필요한 최소 권한
  contents: read
  pages: write
  id-token: write

concurrency:
  # 같은 브랜치에서 연속 배포 시 이전 실행은 취소
  group: pages-map-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      # GitHub Pages 환경으로 배포 (Settings → Pages에서 "GitHub Actions" 사용)
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Kakao JS key into HTML
        run: |
          # map-site/kakao.html 안에는 %KAKAO_JS_KEY% 플레이스홀더가 있고,
          # 여기서 GitHub Secret 값을 문자열 치환(sed)으로 주입한다.
          #
          # 주의: 이 키는 "완전한 비밀"로 숨길 수 있는 성격은 아니지만
          # (브라우저/웹뷰에서 JS SDK 로드에 사용됨),
          # 레포에 하드코딩 커밋을 피하기 위해 Secret로 관리한다.
          if [ -z "${KAKAO_JS_KEY}" ]; then
            echo "KAKAO_JS_KEY secret is required"
            exit 1
          fi
          sed -i "s/%KAKAO_JS_KEY%/${KAKAO_JS_KEY}/g" map-site/kakao.html
        env:
          # GitHub 저장소 Settings → Secrets and variables → Actions에 등록 필요
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JAVASCRIPT_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 업로드되는 정적 파일 루트
          path: map-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

